# Uploads the latest CI workflow to Buildkite.
# https://buildkite.com/docs/pipelines/defining-steps
#
# Changes to this file must be manually edited here:
# https://buildkite.com/bun/bun/settings/steps
steps:
  - if: "build.pull_request.repository.fork"
    block: ":eyes:"
    prompt: "Did you review the PR?"
    blocked_state: "running"

  # Reference copy: the LIVE definition of this step is in the Buildkite UI
  # (link above). It runs on queue=build-image — the queue that bakes images
  # and therefore holds the AWS/Azure credentials — because ci.mjs checks
  # image existence there before emitting bake steps (scripts/build/ci).
  # ci.mjs is a plain-JS wrapper that fetches the spec-pinned Node.js
  # (cached) and runs .buildkite/ci.ts under it, so the standing agent's
  # own node version is irrelevant. Keep this in step with the UI.
  - label: ":pipeline:"
    agents:
      queue: "build-image"
    command:
      - "node .buildkite/ci.mjs"
