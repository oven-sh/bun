# Match the native build's linker: clang++ driving lld. The C/C++ object set
# pulled in by `bun_bin/build.rs` is built with clang-21 and assumes lld
# semantics (--icf, --gdb-index, $-continuation rspfiles), and libstdc++ is
# linked statically via the driver — neither of which the default `cc` link
# handles cleanly.

[target.x86_64-unknown-linux-gnu]
linker = "/opt/llvm-21/bin/clang++"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "/opt/llvm-21/bin/clang++"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-apple-darwin]
linker = "clang++"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-apple-darwin]
linker = "clang++"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
