name: Bun AI Review Swarm

# Multi-model PR review for the fork, built on the stock Factory droid-action.
#
# Each matrix lane is one ordinary `Factory-AI/droid-action` review run pinned to
# a different BYOK model with a different review focus. The action owns all the
# mechanics we used to hand-roll: PR context gathering, inline comment placement,
# the summary comment, dedup, and its own internal candidate -> validate pass.
#
# We keep exactly two things the stock action does NOT do on its own:
#   1. BYOK custom models (z.ai GLM, Fireworks Kimi, MiniMax) via ~/.factory.
#   2. The Bun-fork UB review posture + per-lane focus, injected with
#      `--append-system-prompt-file` through the action's `droid_args` input.
#      (The action loads Factory's *bundled* `review` skill, not this repo's
#      .factory/skills, so the posture has to be appended explicitly.)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: bun-ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: review (${{ matrix.lane.tag }})
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lane:
          - id: ub
            tag: "ub · GLM-5.1"
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Your specialty: memory-safety / undefined behaviour at the native boundary

              This is where you go deeper than a generalist. Lead with the
              highest-severity way safe JS can corrupt memory or trigger UB in
              native code.

              Hunt, in priority order:
              - a pointer/length captured before an async hop, then used after the
                backing ArrayBuffer could resize / detach / transfer / be GC'd
              - a snapshot/copy that takes the WHOLE backing store instead of the
                active view region (byteOffset/byteLength), or whose byte/encoding
                semantics differ from the live read
              - JSC protect/unprotect lifetime errors; leaked or double-unprotected values
              - allocator ownership mismatch, use-after-free, double free
              - integer truncation / signed-unsigned / overflow on a size or offset

              For the top finding give: exact failure interleaving, the line, and the
              smallest correct fix. Rank every finding blocker/high/med/low.

              If nothing blocks, do NOT approve. Report "No blocking UB finding
              after checking:" listing the async worker handoff, stale
              pointer/length after RAB resize/detach/transfer, active-view-region
              vs whole-store, pin/unpin + protect/unprotect balance, and
              allocator/lifetime/refcount paths — plus your best failed objection
              and residual risk.

          - id: source-route
            tag: "source-route · GLM-5.1"
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Your specialty: did the fix cover EVERY affected path, and are the claims true?

              You go deeper than a generalist on call-site coverage. The dominant
              risk in this class of fix is "patched one caller, missed the
              siblings." Be exhaustive about call sites.

              Do exactly this:
              - identify the helper/behaviour the patch changed
              - enumerate EVERY caller / sibling path that shares the same hazard
                (other async StringOrBuffer consumers, other crypto entry points, etc.)
              - for each, state: covered by this patch? has a test? still vulnerable?
              - check each PR-body claim against the code: "fixes UB" vs only-behavioural,
                "matches Node" without checking Node, "safe" that ignores a sibling

              Cite file:line for every covered/missed path. A missed path is a blocker.

              If nothing blocks, do NOT approve. Report "No blocking source-route
              finding after checking:" listing the changed helper's callers,
              sibling async StringOrBuffer paths, encoding-variant paths, and each
              PR claim vs the actual code route — plus your best failed objection
              and residual risk.

          - id: opposition
            # Model swapped Kimi-K2.6 (Fireworks Fire Pass) -> MiniMax M3: the Fire
            # Pass leg stalls/times out under load (cancelled last run while the
            # others finished). Same opposition angle, reliable model.
            tag: "opposition · MiniMax-M3"
            model: custom:MiniMax-M3-3
            focus: |
              # Your specialty: argue this PR is wrong, as hard as you honestly can

              Assume it has a defect and go find it — you press harder on this than
              a generalist would. Surface every objection you can actually
              substantiate, strongest first.

              Look hard for:
              - correctness objections
              - a missing test that would expose a real gap
              - a performance regression on the hot path (allocations, copies)
              - a portability / platform-specific break
              - any claim stronger than the evidence supports

              For each, state exactly what would prove or refute it.

              You should almost never produce "no issue" without showing your
              attacks. If nothing blocks, do NOT approve. Report "No blocking
              opposition finding after attempting:" the strongest correctness,
              missing-test, performance, portability, and overclaim objections —
              plus, for each, why it did not hold, and the residual risk.

          - id: arch
            tag: "arch · MiniMax-M3"
            model: custom:MiniMax-M3-3
            focus: |
              # Your specialty: is this the right fix, at the right layer, and no bigger than needed?

              You go deeper than a generalist on the shape of the change:
              - is the fix at the correct boundary, or should it live one layer up/down?
              - helper shape, duplication, a pattern that will rot on the next caller
              - scope creep: unrelated cleanup / speculative refactor / second concern
              - if a finding would broaden the PR, say block-now vs park-as-follow-up

              If nothing blocks, do NOT approve. Report "No blocking architecture
              finding after checking:" the fix boundary, helper shape vs
              duplicated-bug risk, whether it broadens the PR, whether a smaller
              complete fix exists, and whether the perf/memory cost is justified —
              plus your best failed objection and residual risk.

          - id: tests
            tag: "tests · GLM-5.1"
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Your specialty: do the tests actually PROVE the fix?

              You go deeper than a generalist on test rigour. The highest-value
              catch here is a test that passes on BOTH old and new code — it proves
              nothing.

              For each added/changed test:
              - would it FAIL on unpatched main and PASS on the patch? If not, say so loudly.
              - does it assert the real post-condition (e.g. the resize actually took
                effect) or could it pass on a silent no-op?
              - does it exercise the public API and the active view region, not an
                implementation detail?
              - flaky timing, hardcoded ports, network/global-fs deps, tool-missing skips

              If nothing blocks, do NOT approve. Report "No blocking test-proof
              finding after checking:" whether the test fails on unpatched main,
              whether it proves the actual regression, whether resize/fill/timing
              could make it pass accidentally, whether assertions cover the
              dangerous post-submit mutation, and whether it is cheap enough for
              normal CI — plus your best failed objection and residual risk.

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          filter: blob:none
          persist-credentials: false

      - name: Build BYOK model config
        shell: bash
        env:
          GLM: ${{ secrets.GLM }}
          FIREPASS: ${{ secrets.FIREPASS }}
          MINIMAX: ${{ secrets.MINIMAX }}
        run: |
          set -euo pipefail

          test -n "${GLM:-}" || { echo "::error::Missing GLM secret"; exit 1; }
          test -n "${FIREPASS:-}" || { echo "::error::Missing FIREPASS secret"; exit 1; }
          test -n "${MINIMAX:-}" || { echo "::error::Missing MINIMAX secret"; exit 1; }

          # apiKey values stay as ${ENV} refs on purpose: the droid CLI expands
          # them at read time, so the secrets never land in a file on disk.
          mkdir -p .factory
          cat > .factory/byok-settings.json <<'JSON'
          {
            "customModels": [
              {
                "displayName": "GLM-5.1-ZAI-Coding",
                "model": "glm-5.1",
                "baseUrl": "https://api.z.ai/api/coding/paas/v4",
                "apiKey": "${GLM}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 131072
              },
              {
                "displayName": "GLM-4.7-ZAI-Coding",
                "model": "glm-4.7",
                "baseUrl": "https://api.z.ai/api/coding/paas/v4",
                "apiKey": "${GLM}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 131072
              },
              {
                "displayName": "Kimi-K2.6-Turbo-FirePass",
                "model": "accounts/fireworks/routers/kimi-k2p6-turbo",
                "baseUrl": "https://api.fireworks.ai/inference",
                "apiKey": "${FIREPASS}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              },
              {
                "displayName": "MiniMax-M3",
                "model": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

          # Belt-and-suspenders: the action merges `settings` into
          # ~/.factory/droid/settings.json, but the swarm has historically used
          # ~/.factory/settings.json. Write both so customModels resolve no
          # matter which path this CLI build reads.
          mkdir -p "$HOME/.factory"
          cp .factory/byok-settings.json "$HOME/.factory/settings.json"

      - name: Assemble lane review prompt
        shell: bash
        env:
          LANE_FOCUS: ${{ matrix.lane.focus }}
          LANE_TAG: ${{ matrix.lane.tag }}
        run: |
          set -euo pipefail

          # Shared Bun-fork UB posture (the action will not auto-load it), this
          # lane's single-angle focus, and an attribution rule. Appended to the
          # review system prompt verbatim. The tag prefix makes every comment
          # traceable to its lane+model until the action posts that natively
          # (droid-action PR #9).
          {
            if [ -f .factory/skills/review-guidelines/SKILL.md ]; then
              cat .factory/skills/review-guidelines/SKILL.md
            else
              echo "# Bun fork UB review guidelines (SKILL.md missing)"
            fi
            echo
            printf '%s\n' "$LANE_FOCUS"
            echo
            echo "## Attribution (required)"
            echo "Begin EVERY review comment you post (inline and summary) with the literal prefix \`[${LANE_TAG}]\` so the reader can tell which lane and model produced it. Your focus above is your specialty — the thing you must not miss; go deeper on it than a generalist would. If you also notice a serious defect outside that focus, still report it — never stay silent about a real problem."
          } > .factory/lane-prompt.md

      - name: Run review lane
        # Our hardened fork of Factory-AI/droid-action, pinned to the branch that
        # fixes the validator-stage token bug (validator now forwards
        # github_token instead of failing the Factory app-token exchange on the
        # fork). Includes the settings-input/artifact hardening stack.
        uses: EffortlessSteven/droid-action@e1b7d598ff1eccee505e1cc9699186190a958a14
        env:
          GLM: ${{ secrets.GLM }}
          FIREPASS: ${{ secrets.FIREPASS }}
          MINIMAX: ${{ secrets.MINIMAX }}
          # Keep the BYOK keys above as the only model credentials in scope.
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
          OPENAI_API_KEY: ""
          OPENAI_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.DROID }}
          # Use the default workflow token so the action skips Factory's GitHub
          # App token exchange (the app is not installed on the fork). This token
          # has pull-requests: write from the job permissions, enough to post
          # review comments.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: .factory/byok-settings.json
          automatic_review: true
          review_model: ${{ matrix.lane.model }}
          include_suggestions: true
          # Don't @-mention the PR author in Droid status comments (5 lanes would
          # otherwise ping on every review). Inline review comments are unaffected.
          mention_trigger_user: false
          droid_args: --append-system-prompt-file .factory/lane-prompt.md
