name: Bun AI Review Swarm

# Multi-model PR review for the fork, built on the stock Factory droid-action.
#
# Each matrix lane is one ordinary `Factory-AI/droid-action` review run pinned to
# a different BYOK model with a different review focus. The action owns all the
# mechanics we used to hand-roll: PR context gathering, inline comment placement,
# the summary comment, dedup, and its own internal candidate -> validate pass.
#
# We keep exactly two things the stock action does NOT do on its own:
#   1. BYOK custom models (z.ai GLM, Fireworks Kimi, MiniMax) via ~/.factory.
#   2. The Bun-fork UB review posture + per-lane focus, injected with
#      `--append-system-prompt-file` through the action's `droid_args` input.
#      (The action loads Factory's *bundled* `review` skill, not this repo's
#      .factory/skills, so the posture has to be appended explicitly.)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: bun-ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: review (${{ matrix.lane.id }})
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        lane:
          - id: glm51-ub
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Lane focus: undefined behaviour and the native boundary

              This is the hardest lane. Prioritise correctness bugs that safe JS
              can trigger in native code:

              - stale pointer/length after ArrayBuffer resize, detach, transfer, or GC
              - async worker handoff of JS-backed memory
              - JavaScriptCore protect/unprotect lifetime errors, leaked protected values
              - Rust/Zig/C++ FFI layout, aliasing, ownership, mutability mistakes
              - allocator ownership mismatch, use-after-free, double free
              - integer truncation, signed/unsigned conversion, overflow
              - copying the whole backing store instead of the active view region

              Report only actionable findings, line-local where possible.

          - id: glm51-source-route
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Lane focus: source-route verification and claim discipline

              Treat every PR claim as something to verify against the actual code:

              - trace the exact public API to its native implementation
              - find sibling code paths the patch missed
              - Node/Web API compatibility: callback timing, error shape, observable behaviour
              - PR-body overclaims/underclaims, missing caveats
              - "fixes UB" where only a behavioural mismatch is proven
              - "matches Node" without checking Node, "safe" that ignores siblings

              Disprove or confirm each claim concretely; cite file:line.

          - id: kimi-opposition
            model: custom:Kimi-K2.6-Turbo-FirePass-2
            focus: |
              # Lane focus: opposition and performance

              Take the strongest reasonable position against this PR:

              - the sharpest correctness objection
              - the smallest missing test
              - likely performance regression (allocations, hot-path cost)
              - likely portability problem
              - the reason the PR is broader than it needs to be

              If a concern is speculative, state exactly what would prove or
              refute it.

          - id: minimax-architecture
            model: custom:MiniMax-M3-3
            focus: |
              # Lane focus: architecture and the smallest complete fix

              Judge where and how the fix lands:

              - is the fix at the right boundary?
              - helper shape, duplication risk, missed sibling call paths
              - is this the smallest complete fix, or is there scope creep /
                unrelated cleanup / speculative refactor?
              - one issue, one reason to exist

              If a finding would broaden the PR, say whether it should block or be
              parked as a follow-up.

          - id: glm51-tests
            model: custom:GLM-5.1-ZAI-Coding-0
            focus: |
              # Lane focus: test proof quality

              Demand real red/green evidence:

              - does the test fail on unpatched main and pass on the patch?
              - does it prove the actual regression via public APIs?
              - flaky timing windows, hardcoded ports, network/global-fs deps
              - tests that pass on both old and new code
              - tests that silently skip when a tool is missing
              - assertions on irrelevant stderr emptiness
              - stress/ASAN-only cost dressed up as normal CI

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          filter: blob:none
          persist-credentials: false

      - name: Build BYOK model config
        shell: bash
        env:
          GLM: ${{ secrets.GLM }}
          FIREPASS: ${{ secrets.FIREPASS }}
          MINIMAX: ${{ secrets.MINIMAX }}
        run: |
          set -euo pipefail

          test -n "${GLM:-}" || { echo "::error::Missing GLM secret"; exit 1; }
          test -n "${FIREPASS:-}" || { echo "::error::Missing FIREPASS secret"; exit 1; }
          test -n "${MINIMAX:-}" || { echo "::error::Missing MINIMAX secret"; exit 1; }

          # apiKey values stay as ${ENV} refs on purpose: the droid CLI expands
          # them at read time, so the secrets never land in a file on disk.
          mkdir -p .factory
          cat > .factory/byok-settings.json <<'JSON'
          {
            "customModels": [
              {
                "displayName": "GLM-5.1-ZAI-Coding",
                "model": "glm-5.1",
                "baseUrl": "https://api.z.ai/api/coding/paas/v4",
                "apiKey": "${GLM}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 131072
              },
              {
                "displayName": "GLM-4.7-ZAI-Coding",
                "model": "glm-4.7",
                "baseUrl": "https://api.z.ai/api/coding/paas/v4",
                "apiKey": "${GLM}",
                "provider": "generic-chat-completion-api",
                "maxOutputTokens": 131072
              },
              {
                "displayName": "Kimi-K2.6-Turbo-FirePass",
                "model": "accounts/fireworks/routers/kimi-k2p6-turbo",
                "baseUrl": "https://api.fireworks.ai/inference",
                "apiKey": "${FIREPASS}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              },
              {
                "displayName": "MiniMax-M3",
                "model": "MiniMax-M3",
                "baseUrl": "https://api.minimax.io/anthropic",
                "apiKey": "${MINIMAX}",
                "provider": "anthropic",
                "maxOutputTokens": 64000
              }
            ]
          }
          JSON

          # Belt-and-suspenders: the action merges `settings` into
          # ~/.factory/droid/settings.json, but the swarm has historically used
          # ~/.factory/settings.json. Write both so customModels resolve no
          # matter which path this CLI build reads.
          mkdir -p "$HOME/.factory"
          cp .factory/byok-settings.json "$HOME/.factory/settings.json"

      - name: Assemble lane review prompt
        shell: bash
        env:
          LANE_FOCUS: ${{ matrix.lane.focus }}
        run: |
          set -euo pipefail

          # Shared Bun-fork UB posture (the action will not auto-load it) followed
          # by this lane's focus. Appended to the review system prompt verbatim.
          {
            if [ -f .factory/skills/review-guidelines/SKILL.md ]; then
              cat .factory/skills/review-guidelines/SKILL.md
            else
              echo "# Bun fork UB review guidelines (SKILL.md missing)"
            fi
            echo
            printf '%s\n' "$LANE_FOCUS"
          } > .factory/lane-prompt.md

      - name: Run review lane
        # Our hardened fork of Factory-AI/droid-action, pinned to the branch that
        # fixes the validator-stage token bug (validator now forwards
        # github_token instead of failing the Factory app-token exchange on the
        # fork). Includes the settings-input/artifact hardening stack.
        uses: EffortlessSteven/droid-action@5d70e826acd7154766e2d2784ff518ed556830e1
        env:
          GLM: ${{ secrets.GLM }}
          FIREPASS: ${{ secrets.FIREPASS }}
          MINIMAX: ${{ secrets.MINIMAX }}
          # Keep the BYOK keys above as the only model credentials in scope.
          ANTHROPIC_API_KEY: ""
          ANTHROPIC_AUTH_TOKEN: ""
          ANTHROPIC_BASE_URL: ""
          OPENAI_API_KEY: ""
          OPENAI_BASE_URL: ""
        with:
          factory_api_key: ${{ secrets.DROID }}
          # Use the default workflow token so the action skips Factory's GitHub
          # App token exchange (the app is not installed on the fork). This token
          # has pull-requests: write from the job permissions, enough to post
          # review comments.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: .factory/byok-settings.json
          automatic_review: true
          review_model: ${{ matrix.lane.model }}
          include_suggestions: true
          droid_args: --append-system-prompt-file .factory/lane-prompt.md
