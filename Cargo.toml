  "src/js_parser",
  "src/js_parser_jsc",
  "src/js_printer",
  "src/libarchive_sys",
  "src/libdeflate_sys",
  "src/libuv_sys",
  "src/logger",
  "src/logger_jsc",
  "src/lolhtml_sys",
  "src/picohttp",
