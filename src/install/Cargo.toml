[package]
name = "bun_install"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[features]
# Never enabled for this crate. Declared so the `cfg(feature = "shim_standalone")`
# gates inside `windows-shim/{bun_shim_impl,BinLinkingShim}.rs` (which this
# crate compiles as `mod`s) pass `unexpected_cfgs`. The feature is *set* only
# when those files are compiled by the separate `bun_shim_impl` crate.
shim_standalone = []

[lints]
workspace = true

