# The `.bunx` binary-linking shim: encoder/decoder (`bin_linking_shim`) and
# launcher (`launcher`), built two ways from the same library:
#
#   1. As the `[lib]` consumed by `bun_install` / `bun_runtime` (feature
#      `host`) â€” exposes the encoder, `loose_decode`, and
#      `try_startup_from_bun_js` / `read_without_launch` so bun.exe can run
#      the launcher logic in-process and skip a CreateProcessW round-trip.
#   2. As this crate's `[[bin]]` (feature `shim_standalone`, via `main.rs`) â€”
#      produces the tiny freestanding `bun_shim_impl.exe` PE that the `host`
#      build then `include_bytes!`s.
#
# The crate is *not* `bun_install` itself: putting `[[bin]]` there would make
# the bin link the entire `bun_install` lib (50+ crates), and the lib's
# `include_bytes!("bun_shim_impl.exe")` would depend on its own bin's output.
#
# Dependencies in the standalone configuration are deliberately tiny:
# `bun_windows_sys` (leaf Win32 externs, no native C, no `#[no_mangle]`
# exports) and `bun_opaque` (zero-dep, `#![no_std]`, zero `#[no_mangle]`) are
# the ONLY workspace crates. Pulling `bun_core` / `bun_sys` / `bun_string`
# would drag in their `#[no_mangle]` C-ABI surface (`Bun__*`,
# `__bun_dispatch__*`), which references libuv/simdutf/highway/ICU and makes
# those undefined symbols link roots â€” the shim can't satisfy them and
# shouldn't carry them. Those crates are reached for only behind the optional
# `host` feature, which is never enabled together with `shim_standalone`.
#
# The PE is built by `scripts/build/rust.ts` (Windows targets only) before the
# main `cargo build -p bun_bin`, with `--profile shim` (workspace
# `[profile.shim]`: panic=abort, opt-level=z, lto, strip) plus
# `-Zbuild-std=core` / `panic_immediate_abort` / `/ENTRY:shim_main` (no CRT),
# and the output is copied to `src/install/windows-shim/bun_shim_impl.exe`
# for `include_bytes!`.

[package]
name = "bun_shim_impl"
version.workspace = true
edition.workspace = true

[lib]
name = "bun_shim_impl"
path = "lib.rs"

[[bin]]
name = "bun_shim_impl"
path = "main.rs"
# Never built by `cargo build --workspace` â€” only the explicit
# `cargo build -p bun_shim_impl --features shim_standalone` from the build
# script picks it up.
required-features = ["shim_standalone"]

[features]
# Set only when building the freestanding bun_shim_impl.exe PE.
shim_standalone = []
# Set by bun_install / bun_runtime: enables the encoder/host half (pulls
# bun_core / bun_sys / bun_simdutf_sys / bun_options_types).
host = [
  "dep:bun_core",
  "dep:bun_sys",
  "dep:bun_simdutf_sys",
  "dep:bun_options_types",
]

# Almost no crates.io dependencies: `bstr` / `strum` would defeat `#![no_std]`
# (they pull `alloc`/`std` into the link). The shared source's two former uses
# of them â€” `strum::IntoStaticStr` on `FailReason` (never consumed) and
# `bstr::BStr` for byte-slice display â€” are handled with `core`-only code
# under `cfg(feature = "shim_standalone")`.
#
# `bytemuck` is the one exception: it is `#![no_std]` with no `alloc`, exports
# no `#[no_mangle]` symbols, and inlines to the same (ptr, len*2) arithmetic
# the hand-written `from_raw_parts` casts compiled to â€” so it adds zero link
# roots and lets the shared source's `&[u16] â†’ &[u8]` views stay safe.

[lints]
workspace = true

[dependencies]
bytemuck = { version = "1", default-features = false }
bun_core = { workspace = true, optional = true }
bun_sys = { workspace = true, optional = true }
bun_simdutf_sys = { workspace = true, optional = true }
bun_options_types = { workspace = true, optional = true }

[target.'cfg(windows)'.dependencies]
bun_windows_sys.workspace = true
bun_opaque.workspace = true
