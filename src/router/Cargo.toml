# logger + AST stores. dev-deps don't participate in the dep-graph cycle
# check, so this is the architecturally-correct home for the Zig
# `router.zig` test fixture wiring.
bun_resolver.workspace = true
bun_logger.workspace = true
bun_js_parser.workspace = true
