[package]
name = "bun_router"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[dependencies]
strum.workspace = true
phf.workspace = true
bstr.workspace = true
scopeguard.workspace = true
const_format.workspace = true
enum-map.workspace = true
enumset.workspace = true
libc.workspace = true
bitflags.workspace = true
bun_core.workspace = true
bun_collections.workspace = true
bun_ast.workspace = true
bun_options_types.workspace = true
bun_http_types.workspace = true
bun_paths.workspace = true
# `bun_resolver` is acyclic from this crate (resolver does not depend on
# router); router consumes the real `bun_resolver::fs::{FileSystem,DirEntry}`
# now that the `bun_sys::fs::DirEntry` opaque-seam workaround is gone.
bun_resolver.workspace = true
bun_sys.workspace = true
bun_url.workspace = true
bun_wyhash.workspace = true

[dev-dependencies]
# Test harness (Test::make / Test::make_routes) needs the AST stores.
bun_js_parser.workspace = true
