[package]
name = "bun_runtime"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[dependencies]
rust-argon2.workspace = true
bcrypt.workspace = true
getrandom.workspace = true
# Pure-Zig stdlib hash backends (std.crypto.hash.{sha3,blake2}) — per
# docs/PORTING.md, prefer a vetted crates.io impl over hand-porting Keccak/Blake2.
sha3 = { version = "0.10", default-features = false }
blake2 = { version = "0.10", default-features = false }
parking_lot.workspace = true
thiserror.workspace = true
strum.workspace = true
phf.workspace = true
bstr.workspace = true
scopeguard.workspace = true
const_format.workspace = true
enum-map.workspace = true
enumset.workspace = true
libc.workspace = true
bitflags.workspace = true
bun_aio.workspace = true
bun_analytics.workspace = true
bun_base64.workspace = true
bun_boringssl.workspace = true
bun_boringssl_sys.workspace = true
bun_brotli.workspace = true
bun_alloc.workspace = true
bun_core.workspace = true
bun_bundler = { workspace = true, default-features = false }
bun_clap.workspace = true
bun_collections.workspace = true
bun_crash_handler.workspace = true
bun_csrf.workspace = true
# phase-c: css is not on the `bun-rs -e` hot path; gate behind a feature so
# bun_bin does not transitively compile bun_css.
bun_cares_sys.workspace = true
bun_css = { workspace = true, optional = true }
bun_dns.workspace = true
bun_dotenv.workspace = true
bun_event_loop.workspace = true
bun_glob.workspace = true
bun_http.workspace = true
bun_http_jsc.workspace = true
bun_http_types.workspace = true
bun_install.workspace = true
bun_interchange.workspace = true
bun_io.workspace = true
bun_js.workspace = true
bun_js_parser.workspace = true
bun_js_parser_jsc.workspace = true
bun_js_printer.workspace = true
bun_jsc.workspace = true
bun_libarchive.workspace = true
bun_libdeflate_sys.workspace = true
bun_logger.workspace = true
bun_lolhtml_sys.workspace = true
bun_md.workspace = true
bun_options_types.workspace = true
bun_output.workspace = true
bun_spawn.workspace = true
bun_sql_jsc.workspace = true
bun_paths.workspace = true
bun_picohttp.workspace = true
bun_ptr.workspace = true
bun_resolve_builtins.workspace = true
bun_resolver.workspace = true
bun_router.workspace = true
bun_s3_signing.workspace = true
bun_safety.workspace = true
bun_semver.workspace = true
bun_sha_hmac.workspace = true
bun_shell_parser.workspace = true
bun_simdutf_sys.workspace = true
bun_sourcemap.workspace = true
bun_sourcemap_jsc.workspace = true
bun_standalone_graph.workspace = true
bun_string.workspace = true
bun_sys.workspace = true
bun_tcc_sys.workspace = true
bun_threading.workspace = true
bun_transpiler.workspace = true
bun_url.workspace = true
bun_uws.workspace = true
bun_uws_sys.workspace = true
bun_valkey.workspace = true
bun_watcher.workspace = true
bun_which.workspace = true
bun_hash.workspace = true
bun_wyhash.workspace = true
bun_zlib.workspace = true
bun_zstd.workspace = true

[features]
default = []
# Enables Bun.color() and CSS-typed Maybe helpers. Off by default so that
# `cargo build -p bun_bin` does not pull bun_css into the dep graph.
css = ["dep:bun_css", "bun_bundler/css"]
