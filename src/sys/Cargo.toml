[package]
name = "bun_sys"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[features]
# Zig `Environment.ci_assert` → opt-in extra invariant checks (off by default).
ci_assert = []

[dependencies]
bytemuck = "1"
bun_opaque.workspace = true
strum.workspace = true
phf.workspace = true
bstr.workspace = true
scopeguard.workspace = true
const_format.workspace = true
enum-map.workspace = true
enumset.workspace = true
libc.workspace = true
bitflags.workspace = true
bun_alloc.workspace = true
bun_core.workspace = true
bun_errno.workspace = true
bun_paths.workspace = true
bun_windows_sys.workspace = true
bun_wyhash.workspace = true
thiserror.workspace = true

[target.'cfg(any(target_os = "linux", target_os = "android"))'.dependencies]
# Raw Linux syscalls (linux_raw backend — no libc trampoline). Mirrors Zig's
# `std.os.linux`: hot-path open/read/write/close/fstat/etc go straight to the
# kernel via inline asm, skipping glibc's PLT + errno-TLS + cancellation check.
# Android: same kernel ABI; rustix's linux_raw backend supports it directly.
rustix = { workspace = true }
# SIMD-vectorized NUL scan for `linux_dirent64.d_name` in the getdents64 walk
# (mirrors Zig's `indexOfScalar`); a scalar byte loop showed up in startup profiles.
memchr = { workspace = true }

[target.'cfg(windows)'.dependencies]
bun_libuv_sys.workspace = true
bun_output.workspace = true
