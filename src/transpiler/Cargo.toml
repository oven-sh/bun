[package]
name = "bun_transpiler"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[dependencies]
# `Transpiler` (the high-level wrapper around the parser/options/resolver/env
# stack) physically lives in `bun_bundler::transpiler`. This crate is the
# tier-neutral re-export point so callers (`bun_install`, runtime CLI) can
# `use bun_transpiler::Transpiler` without naming `bun_bundler` directly.
bun_bundler.workspace = true
strum.workspace = true
phf.workspace = true
bstr.workspace = true
scopeguard.workspace = true
const_format.workspace = true
enum-map.workspace = true
enumset.workspace = true
libc.workspace = true
bitflags.workspace = true

