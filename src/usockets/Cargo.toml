[package]
name = "bun_usockets"
version.workspace = true
edition.workspace = true

[lib]
path = "lib.rs"

[features]
default = ["cabi"]
# cabi.rs exports the `#[no_mangle]` us_* C-ABI symbols; the C core in
# packages/bun-usockets is deleted, so these are the sole definitions.
cabi = []
# Fault-injection API (fault.rs). Mirrors the old `--cfg socket_fault_injection`
# RUSTFLAGS knob as a cargo feature so `cargo check -p bun_usockets` can gate it.
socket_fault_injection = []

[lints]
workspace = true

[dependencies]
bun_core.workspace = true
# Protocol v2 owner refcounting (protocol.rs; safe-protocol.md).
bun_ptr.workspace = true
# Platform-split `addrinfo` type shared with the DNS bridge (consumers/04).
bun_dns.workspace = true
libc.workspace = true
# Raw BoringSSL bindings (tls-semantics.md Part 2d). build.rs is replaced by
# patches/boringssl/bssl-sys-prebuilt-bindings.patch: it runs bindgen at build
# time into OUT_DIR (consumed via the crate's BINDGEN_RS_FILE escape hatch)
# and emits no link directives — Bun compiles/links its own BoringSSL objects
# via scripts/build/deps/boringssl.ts. See tls/bssl_bindings/README.md.
bssl-sys = { path = "../../vendor/boringssl/rust/bssl-sys" }

[target.'cfg(windows)'.dependencies]
bun_libuv_sys.workspace = true
# Winsock2 surface (sockaddr types, WSAE* codes, getaddrinfo) + kernel32
# SetHandleInformation for the no-inherit (FD_CLOEXEC parity) path.
bun_windows_sys.workspace = true
