services:
  # PostgreSQL Services
  # These images bake a pre-initialized PGDATA (initdb + init scripts) into the
  # image so cold container start is `exec postgres` (~1-2s) instead of the
  # stock entrypoint's first-boot init. State lives on the container's CoW
  # layer, so a fresh container is still a fresh cluster.
  postgres_plain:
    build:
      context: .
      dockerfile: Dockerfile.postgres-plain
    image: bun-postgres-plain:local
    ports:
      - target: 5432
        published: 0
        protocol: tcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  postgres_tls:
    build:
      context: ../js/sql/docker-tls
      dockerfile: Dockerfile
    image: bun-postgres-tls:local
    ports:
      - target: 5432
        published: 0
        protocol: tcp
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c ssl=on
      -c ssl_cert_file=/etc/postgresql/ssl/server.crt
      -c ssl_key_file=/etc/postgresql/ssl/server.key
      -c max_prepared_transactions=1000
      -c max_connections=2000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  postgres_auth:
    build:
      context: .
      dockerfile: Dockerfile.postgres-auth
    image: bun-postgres-auth:local
    ports:
      - target: 5432
        published: 0
        protocol: tcp
    command: >
      postgres
      -c hba_file=/etc/postgresql/pg_hba.conf
      -c max_prepared_transactions=1000
      -c max_connections=2000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  # MySQL Services
  # These images bake a pre-initialized data dir so cold container start is
  # `exec mysqld` (~2-3s) instead of the stock entrypoint's first-boot init
  # (`mysqld --initialize` + temp server + tzinfo load, ~60s on loaded CI
  # hosts). State lives on the container's CoW layer, so a fresh container is a
  # fresh database.
  mysql_plain:
    build:
      context: .
      dockerfile: Dockerfile.mysql-plain
    image: bun-mysql-plain:local
    ports:
      - target: 3306
        published: 0
        protocol: tcp
    healthcheck:
      # 127.0.0.1 (not localhost) forces TCP — `localhost` would use the unix
      # socket, which is up during the entrypoint's temporary init server and
      # passes the check before the real TCP listener exists. Auth + SELECT 1
      # so we don't go healthy until the real server is accepting connections.
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-e", "SELECT 1"]
      # Once start_period elapses the engine probes at `interval`, not
      # `start_interval`, so a long interval would wedge health at "starting"
      # if init overshot the window; keep interval short so an overshoot on any
      # service recovers within one probe.
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  mysql_native_password:
    build:
      context: .
      dockerfile: Dockerfile.mysql-native-password
    image: bun-mysql-native-password:local
    ports:
      - target: 3306
        published: 0
        protocol: tcp
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-pbun", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  mysql_tls:
    build:
      context: ../js/sql/mysql-tls
      dockerfile: Dockerfile
      args:
        MYSQL_VERSION: 8.4
    image: bun-mysql-tls:local
    ports:
      - target: 3306
        published: 0
        protocol: tcp
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-pbun", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  # Redis/Valkey Services
  redis_plain:
    image: redis:7-alpine
    command: redis-server --bind 0.0.0.0 --protected-mode no
    ports:
      - target: 6379
        published: 0
        protocol: tcp
    tmpfs:
      - /data

  redis_unified:
    build:
      context: ../js/valkey/docker-unified
      dockerfile: Dockerfile
    image: bun-redis-unified:local
    ports:
      - target: 6379
        published: 0
        protocol: tcp
        name: tcp
      - target: 6380
        published: 0
        protocol: tcp
        name: tls
    volumes:
      - redis-unix:/tmp/redis
      - redis-data:/data

  # MinIO (S3) Service
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: localhost
    command: server /data --console-address :9001
    ports:
      - target: 9000
        published: 0
        protocol: tcp
        name: api
      - target: 9001
        published: 0
        protocol: tcp
        name: console
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  # WebSocket Autobahn Test Suite
  # NOTE: Autobahn requires port 9002 to match both internal and external ports
  # because it validates the Host header against its configured listening port.
  # Dynamic port mapping causes "port X does not match server listening port 9002" errors.
  autobahn:
    build:
      context: .
      dockerfile: Dockerfile.autobahn
    image: bun-autobahn:local
    command: wstest -m fuzzingserver -s /config/fuzzingserver.json
    ports:
      - target: 9002
        published: 0 # Dynamic port
        protocol: tcp
    healthcheck:
      # wstest needs a moment to load its config and bind 9002; without a
      # healthcheck `up --wait` returns at "running" and the test's
      # /getCaseCount fetch can hit before the listener exists.
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('127.0.0.1', 9002), 1).close()"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

  # Squid proxy for WebSocket proxy testing
  squid:
    build:
      context: .
      dockerfile: Dockerfile.squid
    image: bun-squid:local
    ports:
      - target: 3128
        published: 0
        protocol: tcp
    # Use extra_hosts to allow connections back to host services via bridge network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "pgrep squid > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
      start_interval: 1s

volumes:
  redis-unix:
  redis-data:
    driver: local

networks:
  default:
    driver: bridge
