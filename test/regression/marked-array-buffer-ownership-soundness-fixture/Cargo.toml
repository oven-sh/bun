# Compile-only fixture for test/regression/marked-array-buffer-ownership-soundness.test.ts
# — verifies that `bun_jsc::MarkedArrayBuffer` has no safe constructor that
# adopts a borrowed `&mut [u8]` as an allocator-owned buffer (issue #31969).
# The test invokes `cargo check` on this crate and asserts the expected
# resolution error fires.
#
# Detached from the parent workspace so `cargo check` on the top-level
# doesn't pull it in (it intentionally fails to compile).
# `Cargo.lock` is committed so the test driver pins the transitive dep
# graph with `--locked` — keeps the compile-fail check hermetic rather
# than re-resolving `bun_jsc`'s deps against crates.io on every run.
[workspace]

[package]
name = "marked_array_buffer_ownership_soundness_fixture"
version = "0.0.0"
edition = "2021"
publish = false

[dependencies]
bun_jsc = { path = "../../../src/jsc" }

[lib]
path = "src/lib.rs"
